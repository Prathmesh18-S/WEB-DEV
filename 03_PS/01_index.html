<!--
 
Problem Statement 3: Student Profile Form with Validation 
Design and develop a Student Profile Form using HTML, CSS, and JavaScript. 
Requirements: 
•	Use proper HTML form elements (input fields, labels, buttons, etc.) 
•	Apply CSS styling to create a clean, well-structured, and visually appealing layout • Implement JavaScript validations for all fields, such as: 
o Required field validation o Proper email format validation o Age should be within a valid range o Roll number format (as per your chosen pattern) o File type validation for profile photo o Display appropriate error messages for invalid inputs 
 
Additional Requirement: 
   After clicking the submit button:  
•	The button text should change (e.g., “Submitted Successfully”)  
•	The button color should change to indicate successful submission  
•	This change should occur only after all validations are successfully passed 

-->

<!DOCTYPE html>
<html>
<head>
<title>Student Form Validation</title>

<link rel="stylesheet" href="01_style.css">

<script src="01_app.js"></script>

</head>
<body>

<div class="form-box">

<form onsubmit="return validateForm()">

<h2>Student Profile Form</h2>

<label>Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="text" id="email">

<label>Age</label>
<input type="number" id="age">

<label>Roll Number</label>
<input type="text" id="roll">

<label>Profile Photo</label>
<input type="file" id="photo">

<button id="btn" type="submit">
Submit
</button>

</form>

</div>

</body>
</html>
