<!--Problem Statement 1: Student Profile Form Design 
Design and develop a Student Profile Form using HTML and CSS. 
Requirements: 
•	Use proper HTML form elements (input fields, labels, buttons, etc.) 
•	Apply CSS for styling to make the form visually appealing 
•	Ensure the layout is clean, organized, and user-friendly 
-->

<!DOCTYPE html>
<html>
<head>
<title>Student Profile Form</title>
<link rel="stylesheet" href="01_style.css">
</head>
<body>

<div class="container">

<h2>Student Registration Form</h2>

<form>

<label>Student Name</label>
<input type="text">

<label>Roll Number</label>
<input type="text">

<label>Email</label>
<input type="email">

<label>Date of Birth</label>
<input type="date">

<label>Department</label>
<select>
<option>Computer</option>
<option>IT</option>
<option>AIML</option>
</select>

<label>Gender</label><br>

<input type="radio" name="g"> Male
<input type="radio" name="g"> Female

<br><br>

<label>Address</label>
<textarea></textarea>

<br><br>

<input type="submit" value="Register">

</form>

</div>

</body>
</html>
